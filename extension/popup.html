<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Delulu Detector</title>
    <style>
      :root {
        color-scheme: dark;
        --orange: #f97316;
        --orange-hot: #ff2d7e;
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
      }
      body {
        margin: 0;
        width: 280px;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        /* Warm flame glow at the top, matching the app's 3am-dark theme. */
        background:
          radial-gradient(
            360px 200px at 50% -20%,
            rgba(249, 115, 22, 0.18) 0%,
            rgba(249, 115, 22, 0) 70%
          ),
          var(--bg);
        color: var(--fg);
      }
      .wrap {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .brand {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--orange);
      }
      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.3;
        color: var(--fg);
      }
      p {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }
      button {
        appearance: none;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--orange), var(--orange-hot));
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        padding: 11px 12px;
        cursor: pointer;
        transition: filter 0.15s ease, opacity 0.15s ease;
      }
      button:hover {
        filter: brightness(1.08);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        min-height: 16px;
        font-size: 12px;
        color: var(--muted);
      }
      .status.error {
        color: #f87171;
      }
      details {
        font-size: 12px;
        color: var(--muted);
      }
      summary {
        cursor: pointer;
        user-select: none;
      }
      .config {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      input[type="url"] {
        flex: 1;
        min-width: 0;
        border: 1px solid #3f3f46;
        border-radius: 8px;
        padding: 8px 9px;
        font-size: 12px;
        background: #18181b;
        color: var(--fg);
      }
      input[type="url"]::placeholder {
        color: #52525b;
      }
      input[type="url"]:focus {
        outline: 2px solid var(--orange);
        outline-offset: -1px;
      }
      .save {
        flex: none;
        background: #27272a;
        padding: 8px 10px;
        font-size: 12px;
        border-radius: 8px;
      }
      .save:hover {
        background: #3f3f46;
        filter: none;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <span class="brand">🔥 Delulu Detector</span>
      <h1>Roast the chat you're viewing</h1>
      <p>Open an Instagram DM thread, then hit the button. We read what's on screen — nothing is stored.</p>
      <button id="roast">Am I delusional?</button>
      <div class="status" id="status"></div>
      <details id="settings">
        <summary>App URL</summary>
        <div class="config">
          <input
            id="app-url"
            type="url"
            inputmode="url"
            placeholder="https://your-app.vercel.app"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="save" id="save-url" type="button">Save</button>
        </div>
      </details>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
